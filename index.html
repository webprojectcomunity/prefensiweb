<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Absensi Karyawan</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-4">

    <div id="cardAbsen" class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
        <h2 id="tvJudul" class="text-2xl font-bold text-center text-slate-800 mb-2">Absensi</h2>
        <p id="tvStatus" class="text-center text-slate-500 text-sm mb-6">Mencari lokasi GPS...</p>
        
        <div id="formContainer" class="space-y-4">
            <div id="layoutInput" class="hidden space-y-4">
                <textarea id="etUraian" class="w-full p-3 border rounded-xl" placeholder="Uraian Tugas"></textarea>
                <input type="text" id="etOutput" class="w-full p-3 border rounded-xl" placeholder="Output Kegiatan">
            </div>
            
            <button id="btnAbsen" disabled onclick="prosesAbsen()" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl disabled:bg-slate-300 transition">
                ABSEN SEKARANG
            </button>
        </div>
        
        <button onclick="window.location.href='registerweb.html'" class="w-full mt-6 text-slate-400 text-xs text-center hover:underline">
            Belum terdaftar? Daftar di sini
        </button>
    </div>

    <script>
        const scriptUrl = "https://script.google.com/macros/s/AKfycbzFi2rasPQracQJ9WMU3805SjnmfyNxtMYIli0rzLuWI-Yfx2m3Q_aXLGLgTJ7fh41U/exec";
        let isAbsenPulang = false;
        let lat = 0, lng = 0;

        window.onload = () => {
            const jam = new Date().getHours();
            isAbsenPulang = (jam >= 14);
            document.getElementById('tvJudul').innerText = isAbsenPulang ? "Absensi Pulang" : "Absensi Masuk";
            if (isAbsenPulang) document.getElementById('layoutInput').classList.remove('hidden');
            document.getElementById('tvStatus').innerText = "Status: Siap Absen";
            initGPS();
        };

        function initGPS() {
            if (!navigator.geolocation) { alert("GPS tidak didukung."); return; }
            navigator.geolocation.getCurrentPosition(pos => {
                lat = pos.coords.latitude;
                lng = pos.coords.longitude;
                document.getElementById('btnAbsen').disabled = false;
                document.getElementById('tvStatus').innerText = "📍 Lokasi Terdeteksi";
            }, err => {
                document.getElementById('tvStatus').innerText = "⚠️ Aktifkan Izin Lokasi!";
                alert("Izin lokasi diperlukan.");
            }, { enableHighAccuracy: true, timeout: 10000 });
        }

        async function prosesAbsen() {
            const btn = document.getElementById('btnAbsen');
            const deviceId = localStorage.getItem("webDeviceId");
            
            if (!deviceId) { alert("Perangkat belum terdaftar!"); return; }

            btn.disabled = true;
            btn.innerText = "Memverifikasi...";

            const payload = {
                action: "verify",
                deviceId: deviceId,
                uraianTugas: isAbsenPulang ? document.getElementById('etUraian').value : "Absen Masuk Kerja",
                outputKegiatan: isAbsenPulang ? document.getElementById('etOutput').value : "Hadir",
                latitude: lat,
                longitude: lng,
                isMock: false
            };

            try {
                const res = await fetch(scriptUrl, {
                    method: 'POST',
                    mode: 'cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const responseText = await res.text();

                // Algoritma Penyesuaian: Menangkap keyword "Sukses" atau "Gagal" dari kode.gs
                if (responseText.includes("Sukses")) {
                    alert("Berhasil: " + responseText);
                    location.reload();
                } else {
                    alert("Gagal: " + responseText);
                    btn.disabled = false;
                    btn.innerText = "ABSEN SEKARANG";
                }
            } catch (e) {
                alert("Kesalahan Koneksi ke Server. Pastikan deployment 'Anyone' sudah benar.");
                btn.disabled = false;
                btn.innerText = "ABSEN SEKARANG";
            }
        }
    </script>
</body>
</html>
